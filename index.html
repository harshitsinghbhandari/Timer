<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=DM+Sans:wght@200;300&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0a;
      --fg: #f0ede8;
      --muted: #3a3835;
      --accent: #c8b89a;
      --btn-bg: #141412;
      --btn-active: #1e1c19;
      --radius: 14px;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: 'DM Sans', sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding: env(safe-area-inset-top, 20px) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    }

    /* ── PRESETS ── */
    .presets {
      display: flex;
      gap: 8px;
      padding: 20px 20px 0;
      flex-shrink: 0;
    }

    .preset {
      flex: 1;
      background: var(--btn-bg);
      border: 1px solid #1f1e1b;
      border-radius: 10px;
      padding: 10px 4px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 300;
      color: #7a7670;
      letter-spacing: 0.04em;
      text-align: center;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.15s;
      line-height: 1.4;
    }

    .preset.active {
      color: var(--accent);
      border-color: #2e2b26;
      background: var(--btn-active);
    }

    .preset:active {
      transform: scale(0.97);
    }

    .preset span {
      display: block;
      font-size: 9px;
      color: #4a4844;
      margin-top: 2px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 200;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .preset.active span {
      color: #6a6460;
    }

    /* ── TIMER DISPLAY ── */
    .timer-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 20px;
    }

    .timer {
      font-family: 'DM Mono', monospace;
      font-size: clamp(52px, 18vw, 86px);
      font-weight: 300;
      letter-spacing: -0.02em;
      color: var(--fg);
      line-height: 1;
      transition: color 0.4s;
      text-align: center;
    }

    .timer.done {
      color: var(--accent);
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    .progress-track {
      width: 100%;
      height: 1px;
      background: var(--muted);
      border-radius: 1px;
      overflow: hidden;
      margin-top: 6px;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 1px;
      width: 100%;
      transform-origin: left;
      transition: transform 0.5s linear;
    }

    .label {
      font-size: 11px;
      font-weight: 200;
      color: #4a4844;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── BUTTONS ── */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 16px 20px;
      padding-bottom: max(env(safe-area-inset-bottom, 16px), 24px);
      flex-shrink: 0;
    }

    .btn {
      width: 100%;
      height: 60px;
      border-radius: var(--radius);
      border: 1px solid #1f1e1b;
      background: var(--btn-bg);
      color: var(--fg);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, color 0.2s, border-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active {
      transform: scale(0.98);
      background: var(--btn-active);
    }

    .btn-start {
      background: var(--fg);
      color: var(--bg);
      border-color: var(--fg);
      font-size: 14px;
    }

    .btn-start:active {
      background: var(--accent);
      border-color: var(--accent);
    }

    .btn-pause {
      background: var(--btn-bg);
      color: var(--accent);
      border-color: #2e2b26;
    }

    .btn-reset {
      color: #4a4844;
      font-size: 11px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    .dot-run {
      background: #3a8a5a;
      animation: blink 1s step-start infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    /* ── FOCUS MODE ── */
    .focus-btn {
      position: absolute;
      top: env(safe-area-inset-top, 20px);
      right: 20px;
      z-index: 100;
      background: transparent;
      border: none;
      color: var(--muted);
      padding: 8px;
      cursor: pointer;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .focus-btn:active {
      color: var(--accent);
    }

    body.focus-mode {
      background: #000;
    }

    body.focus-mode .presets,
    body.focus-mode .controls,
    body.focus-mode .label,
    body.focus-mode .progress-track,
    body.focus-mode .focus-btn {
      display: none;
    }

    body.focus-mode .timer-wrap {
      padding: 0;
      cursor: pointer;
    }

    body.focus-mode .timer {
      font-size: clamp(80px, 25vw, 160px);
      color: #fff;
    }
  </style>
</head>

<body>

  <button class="focus-btn" id="popoutBtn" onclick="togglePiP()" aria-label="Pop out timer" style="right: 60px;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
      <polyline points="17 8 12 3 7 8" />
      <line x1="12" y1="3" x2="12" y2="15" />
    </svg>
  </button>

  <button class="focus-btn" id="focusBtn" onclick="toggleFocus()" aria-label="Enter focus mode">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" />
    </svg>
  </button>

  <div class="presets" id="presets">
    <button class="preset active" data-seconds="300">
      05:00
      <span>5 min</span>
    </button>
    <button class="preset" data-seconds="1500">
      25:00
      <span>25 min</span>
    </button>
    <button class="preset" data-seconds="3600">
      1:00:00
      <span>1 hr</span>
    </button>
    <button class="preset" data-seconds="7200">
      2:00:00
      <span>2 hrs</span>
    </button>
    <button class="preset" data-seconds="9000">
      2:30:00
      <span>2.5 hrs</span>
    </button>
  </div>

  <div id="pip-container">
    <div class="timer-wrap" id="timerContainer">
      <div class="timer" id="display">05:00</div>
      <div class="progress-track">
        <div class="progress-fill" id="progress"></div>
      </div>
      <div class="label" id="statusLabel">ready</div>
    </div>
  </div>

  <div id="pip-overlay"
    style="display:none; flex:1; flex-direction:column; align-items:center; justify-content:center; color:#4a4844; font-size:12px; letter-spacing:0.05em; text-transform:uppercase;">
    Timer is in pop-out window
    <button class="btn btn-reset" onclick="togglePiP()" style="width:auto; height:auto; margin-top:20px; padding:10px 20px;">Return to Tab</button>
  </div>

  <div class="controls">
    <button class="btn btn-start" id="toggleBtn" onclick="toggle()">
      <span class="dot"></span>
      Start
    </button>
    <button class="btn btn-reset" onclick="reset()">Reset</button>
  </div>

  <script>
    const PRESETS = [300, 1500, 3600, 7200, 9000];
    let totalSeconds = 300;
    let remaining = 300;
    let running = false;
    let interval = null;
    let doneFlag = false;
    let pipWindow = null;

    const display = document.getElementById('display');
    const progress = document.getElementById('progress');
    const statusLabel = document.getElementById('statusLabel');
    const toggleBtn = document.getElementById('toggleBtn');
    const presetBtns = document.querySelectorAll('.preset');
    const timerContainer = document.getElementById('timerContainer');
    const pipOverlay = document.getElementById('pip-overlay');
    const pipBtn = document.getElementById('popoutBtn');

    function fmt(s) {
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      if (h > 0) return `${h}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
      return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
    }

    function updateDisplay() {
      display.textContent = fmt(remaining);
      const ratio = totalSeconds > 0 ? remaining / totalSeconds : 0;
      progress.style.transform = `scaleX(${ratio})`;
    }

    function setToggleState(state) {
      // state: 'ready' | 'running' | 'paused' | 'done'
      toggleBtn.className = 'btn';
      const dot = toggleBtn.querySelector('.dot');

      if (state === 'running') {
        toggleBtn.classList.add('btn-pause');
        dot.className = 'dot dot-run';
        toggleBtn.childNodes[1].textContent = ' Pause';
        statusLabel.textContent = 'running';
      } else if (state === 'paused') {
        toggleBtn.classList.add('btn-start');
        dot.className = 'dot';
        toggleBtn.childNodes[1].textContent = ' Resume';
        statusLabel.textContent = 'paused';
      } else if (state === 'done') {
        toggleBtn.classList.add('btn-reset');
        dot.className = 'dot';
        toggleBtn.style.pointerEvents = 'none';
        toggleBtn.childNodes[1].textContent = ' Done';
        statusLabel.textContent = 'done';
      } else {
        toggleBtn.classList.add('btn-start');
        dot.className = 'dot';
        toggleBtn.childNodes[1].textContent = ' Start';
        toggleBtn.style.pointerEvents = '';
        statusLabel.textContent = 'ready';
      }
    }

    function toggle() {
      if (doneFlag) return;
      if (running) {
        clearInterval(interval);
        running = false;
        setToggleState('paused');
      } else {
        running = true;
        setToggleState('running');
        interval = setInterval(tick, 1000);
      }
    }

    function tick() {
      if (remaining <= 0) {
        finish();
        return;
      }
      remaining--;
      updateDisplay();
      if (remaining <= 0) finish();
    }

    function finish() {
      clearInterval(interval);
      running = false;
      doneFlag = true;
      remaining = 0;
      updateDisplay();
      display.classList.add('done');
      setToggleState('done');
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    }

    function reset() {
      clearInterval(interval);
      running = false;
      doneFlag = false;
      remaining = totalSeconds;
      display.classList.remove('done');
      toggleBtn.style.pointerEvents = '';
      updateDisplay();
      setToggleState('ready');
    }

    function selectPreset(idx) {
      if (running) {
        clearInterval(interval);
        running = false;
      }
      doneFlag = false;
      totalSeconds = PRESETS[idx];
      remaining = totalSeconds;
      display.classList.remove('done');
      toggleBtn.style.pointerEvents = '';
      presetBtns.forEach((b, i) => b.classList.toggle('active', i === idx));
      updateDisplay();
      setToggleState('ready');
    }

    function toggleFocus() {
      document.body.classList.toggle('focus-mode');

      if (document.body.classList.contains('focus-mode')) {
        if (document.documentElement.requestFullscreen) {
          document.documentElement.requestFullscreen().catch(() => { });
        }
      } else {
        if (document.exitFullscreen && document.fullscreenElement) {
          document.exitFullscreen().catch(() => { });
        }
      }
    }

    async function togglePiP() {
      if (pipWindow) {
        pipWindow.close();
        return;
      }

      if (!('documentPictureInPicture' in window)) {
        alert('Document Picture-in-Picture is not supported in this browser. Try Chrome 116+');
        return;
      }

      try {
        // Open the PiP window
        pipWindow = await window.documentPictureInPicture.requestWindow({
          width: 320,
          height: 320,
        });

        // Copy styles
        [...document.styleSheets].forEach((styleSheet) => {
          try {
            const cssRules = [...styleSheet.cssRules].map((rule) => rule.cssText).join('');
            const style = document.createElement('style');
            style.textContent = cssRules;
            pipWindow.document.head.appendChild(style);
          } catch (e) {
            const link = document.createElement('link');
            if (styleSheet.href) {
              link.rel = 'stylesheet';
              link.type = styleSheet.type;
              link.media = styleSheet.media;
              link.href = styleSheet.href;
              pipWindow.document.head.appendChild(link);
            }
          }
        });

        // Add extra PiP specific styles to handle resizing better
        const pipStyle = document.createElement('style');
        pipStyle.textContent = `
          body { padding: 0 !important; display: flex !important; align-items: center; justify-content: center; background: #000; }
          .timer-wrap { width: 100%; height: 100%; padding: 20px; }
          .timer { font-size: clamp(40px, 20vw, 120px); }
        `;
        pipWindow.document.head.appendChild(pipStyle);

        // Move timer container to PiP window
        pipWindow.document.body.append(timerContainer);
        pipOverlay.style.display = 'flex';
        pipBtn.style.color = 'var(--accent)';

        // Handle PiP window close
        pipWindow.addEventListener('pagehide', (event) => {
          pipWindow = null;
          document.getElementById('pip-container').append(timerContainer);
          pipOverlay.style.display = 'none';
          pipBtn.style.color = '';
        });

      } catch (err) {
        console.error('Failed to enter PiP:', err);
      }
    }

    // Tap display to exit focus mode
    timerContainer.addEventListener('click', () => {
      if (document.body.classList.contains('focus-mode')) {
        toggleFocus();
      }
    });

    presetBtns.forEach((btn, i) => {
      btn.addEventListener('click', () => selectPreset(i));
    });

    updateDisplay();
    setToggleState('ready');
  </script>
</body>

</html>
